<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NBRT VPN Pro - İndir</title>
    <style>
        :root {
            --primary: #007bff;
            --dark: #1a1a1a;
            --light: #f8f9fa;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--light);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        .icon {
            font-size: 50px;
            margin-bottom: 1rem;
        }
        h1 {
            color: var(--dark);
            margin-bottom: 0.5rem;
        }
        p {
            color: #666;
            margin-bottom: 2rem;
        }
        .btn-download {
            background-color: var(--primary);
            color: white;
            padding: 12px 30px;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            transition: transform 0.2s, background-color 0.2s;
            display: inline-block;
        }
        .btn-download:hover {
            background-color: #0056b3;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="icon">🛡️</div>
        <h1>NBRT VPN Pro</h1>
        <p>Güvenli ve hızlı internet erişimi için Windows sürümünü indirin.</p>
        
        <a href="NBRT_VPN.exe" download class="btn-download">
            Hemen İndir (.exe)
        </a>
        
        <div style="margin-top: 1.5rem; font-size: 0.8rem; color: #999;">
            Sürüm: 1.0.0 | Boyut: Otomatik
        </div>
    </div>

</body>
</html>
